<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | {% block title %}Urban Response AI{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #3B82F6;
            --bg: #0F172A;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-light: rgba(51, 65, 85, 0.5);
            --border: rgba(255, 255, 255, 0.1);
            --text: #F8FAFC;
            --text-muted: #94A3B8;
            --danger: #EF4444;
            --success: #10B981;
            --sidebar-width: 260px;
            --sidebar-collapsed: 72px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        /* Professional Sidebar */
        .sidebar {
            width: var(--sidebar-collapsed);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            backdrop-filter: blur(12px);
            position: relative;
        }

        .sidebar:hover { width: var(--sidebar-width); }

        .sidebar-header {
            height: 72px;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 1rem;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
        }

        .menu-btn {
            min-width: 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .menu-btn span { width: 24px; height: 2px; background: var(--text); border-radius: 2px; }

        .logo-text { font-weight: 800; font-size: 1.25rem; white-space: nowrap; opacity: 0; transition: opacity 0.2s; }
        .sidebar:hover .logo-text { opacity: 1; }

        .nav-items { flex-grow: 1; padding: 1rem 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; overflow-x: hidden; }

        .nav-item {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            gap: 1.25rem;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-item i { font-style: normal; font-size: 1.25rem; min-width: 24px; text-align: center; }
        .nav-item span { opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .sidebar:hover .nav-item span { opacity: 1; pointer-events: auto; }

        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: var(--primary); border: 1px solid rgba(59, 130, 246, 0.2); }

        /* Main Content */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .header { height: 72px; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(21, 26, 34, 0.4); backdrop-filter: blur(10px); }

        .page-body { flex-grow: 1; overflow-y: auto; padding: 2rem; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        {% block extra_css %}{% endblock %}
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(0.95); opacity: 1; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="menu-btn"><span></span><span></span><span></span></div>
            <div class="logo-text">AURA AI</div>
        </div>
        <nav class="nav-items">
            <a href="/" class="nav-item" id="nav-home"><i>🏠</i><span>Home</span></a>
            <a href="/dashboard" class="nav-item" id="nav-dashboard"><i>📊</i><span>Dashboard</span></a>
            <a href="/live" class="nav-item" id="nav-live"><i>🎥</i><span>Live Monitoring</span></a>
            <a href="/architecture" class="nav-item" id="nav-architecture"><i>🏗️</i><span>Architecture</span></a>
            <a href="/history" class="nav-item" id="nav-history"><i>📜</i><span>History</span></a>
            <a href="/alerts" class="nav-item" id="nav-alerts"><i>🔔</i><span>Alert Logs</span></a>
            <a href="/analytics" class="nav-item" id="nav-analytics"><i>📈</i><span>Analytics</span></a>
            <a href="/about" class="nav-item" id="nav-about"><i>ℹ️</i><span>About Project</span></a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h2 id="page-title">{% block page_title %}Dashboard{% endblock %}</h2>
            <div class="status-indicator" style="display:flex; align-items:center; gap:0.5rem; font-size:0.8rem; color:var(--success)">
                <span style="width:8px; height:8px; background:var(--success); border-radius:50%; animation: pulse 2s infinite"></span>
                SYSTEM ACTIVE
            </div>
        </header>

        <div class="page-body">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        // Set active nav item based on URL
        const path = window.location.pathname;
        const navId = 'nav-' + (path === '/' ? 'home' : path.substring(1));
        const activeNav = document.getElementById(navId);
        if (activeNav) activeNav.classList.add('active');
    </script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
